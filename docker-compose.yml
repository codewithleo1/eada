services:

  postgres:
    image: postgres:16-alpine
    container_name: eada_postgres
    environment:
      POSTGRES_USER: eada
      POSTGRES_PASSWORD: eada
      POSTGRES_DB: eada
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eada"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eada_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: eada_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  langfuse:
    image: langfuse/langfuse:2
    container_name: eada_langfuse
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://eada:eada@postgres:5432/eada
      NEXTAUTH_SECRET: supersecretkey
      NEXTAUTH_URL: http://localhost:3000
      SALT: supersalt
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  qdrant_data: